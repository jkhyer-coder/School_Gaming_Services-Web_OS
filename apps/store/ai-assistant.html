<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #202020; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.4; font-size: 14px; word-wrap: break-word; }
        .user-msg { background: var(--accent, #0078D4); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .ai-msg img { max-width: 100%; border-radius: 4px; margin-top: 10px; display: block; }
        #input-area { padding: 15px; background: #191919; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        input { flex: 1; background: #111; color: white; border: 1px solid #444; padding: 12px; border-radius: 20px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent, #0078D4); }
        button { background: var(--accent, #0078D4); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .typing { font-style: italic; color: #aaa; font-size: 12px; align-self: flex-start; margin-left: 10px; display: none;}
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="message ai-msg">
            👋 Hello! I am your built-in Web OS AI.<br><br>
            • Ask me any question, write code, or summarize text.<br>
            • Type <b>/image [what you want]</b> to generate AI art!<br>
            <i>(Powered by Pollinations.ai)</i>
        </div>
    </div>
    <div class="typing" id="typing-indicator">AI is thinking...</div>
    
    <div id="input-area">
        <input type="text" id="chat-input" placeholder="Type a message or /image..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typing = document.getElementById('typing-indicator');

        // Allow pressing Enter to send
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        let messages = [
            { role: "system", content: "You are a helpful, concise AI assistant built into a Windows 11 style Web OS. Keep answers clean and formatted with HTML breaks where needed." }
        ];

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            typing.style.display = 'block';

            if (text.toLowerCase().startsWith('/image ')) {
                const prompt = text.replace('/image ', '').trim();
                const safePrompt = encodeURIComponent(prompt);
                const seed = Math.floor(Math.random() * 100000); 
                const imgUrl = `https://image.pollinations.ai/prompt/${safePrompt}?seed=${seed}&width=512&height=512&nologo=true`;
                
                const imgHTML = `Here is your image for "${prompt}": <img src="${imgUrl}" alt="Generated AI Art" onload="scrollToBottom()">`;
                appendMessage(imgHTML, 'ai-msg', true);
                resetInput(); return;
            }

            messages.push({ role: "user", content: text });

            try {
                // FIXED ENDPOINT for Text Generation
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        model: "openai" // Or 'mistral', 'llama'
                    })
                });

                // Pollinations root endpoint returns plain text directly
                const aiText = await response.text(); 
                
                messages.push({ role: "assistant", content: aiText });
                
                // Format code blocks
                const formattedText = aiText.replace(/```([\s\S]*?)```/g, '<pre style="background:#111;padding:10px;border-radius:4px;overflow-x:auto;"><code>$1</code></pre>')
                                            .replace(/\n/g, '<br>');

                appendMessage(formattedText, 'ai-msg', true);
            } catch (err) {
                appendMessage("❌ Error connecting to AI server. Please try again.", 'ai-msg');
            }

            resetInput();
        }

        function appendMessage(content, className, isHTML = false) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (isHTML) div.innerHTML = content;
            else div.innerText = content;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function resetInput() {
            input.disabled = false; sendBtn.disabled = false; typing.style.display = 'none'; input.focus();
        }

        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }
    </script>
</body>
</html>
