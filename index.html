<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Web OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="boot-screen">
        <svg viewBox="0 0 24 24" fill="#0078D4" width="80" height="80" style="margin-bottom: 30px;"><path d="M11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4zM11.4 24H0V12.6h11.4V24zm12.6 0H12.6V12.6H24V24z"/></svg>
        <div class="boot-spinner"></div>
    </div>

    <!-- Desktop Area & Drag Selection Box -->
    <div id="desktop"></div>
    <div id="selection-box" class="hidden"></div>
    
    <div id="snap-preview" class="hidden"></div>
    
    <div id="start-menu" class="hidden">
        <div class="start-search">
            <input type="text" placeholder="Search for apps, settings, and documents" disabled>
        </div>
        <div class="start-header" style="display:flex; justify-content:space-between; align-items:center; padding-right:10px;">
            <span>Pinned Apps & Store</span>
            <button id="update-store-btn" onclick="updateAppList()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold; transition:0.2s;">
                🔄 Update App List
            </button>
        </div>
        <div id="store-categories"></div>
    </div>

    <div id="taskbar">
        <div class="taskbar-weather">
            <span style="font-size: 16px;">☁️</span> 68°F
        </div>
        <div class="taskbar-icons" id="taskbar-icons"></div>
        <div class="taskbar-tray">
            <div class="tray-icon">🛜</div>
            <div class="tray-icon">🔊</div>
            <div class="taskbar-time">
                <div id="clock-time">12:00 PM</div>
                <div id="clock-date">10/24/2023</div>
            </div>
        </div>
    </div>

    <div id="personalize-dialog" class="hidden">
        <h3>Change Wallpaper</h3>
        <input type="text" id="wallpaper-input" placeholder="Paste Image URL here...">
        <div style="display:flex; gap:10px; margin-top:15px; justify-content:flex-end;">
            <button onclick="document.getElementById('personalize-dialog').classList.add('hidden')">Cancel</button>
            <button class="primary" onclick="setWallpaper()">Apply</button>
        </div>
    </div>

    <!-- System Notifications -->
    <div id="notification-center"></div>

    <div id="context-menu" class="hidden">
        <div class="context-item" id="ctx-open">Open</div>
        <div class="context-item" id="ctx-download">Download to PC</div>
        <div class="context-item" id="ctx-personalize">Personalize Desktop</div>
        <div class="context-item" id="ctx-delete" style="color: #ff6b6b;">Delete</div>
    </div>

    <script src="js/vfs.js"></script>
    <script src="js/os.js"></script>
</body>
</html>
