<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Web OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Desktop Area -->
    <div id="desktop"></div>
    
    <!-- App Store / Launcher (Start Menu) -->
    <div id="start-menu" class="hidden">
        <div class="start-search">
            <input type="text" placeholder="Search for apps, settings, and documents" disabled>
        </div>
        <div class="start-header">Pinned Apps & Store</div>
        <div id="store-categories"></div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="taskbar-weather">
            <span style="font-size: 16px;">☁️</span> 68°F
        </div>
        
        <div class="taskbar-icons" id="taskbar-icons">
            <!-- Icons injected by JS -->
        </div>

        <div class="taskbar-tray">
            <div class="tray-icon">🛜</div>
            <div class="tray-icon">🔊</div>
            <div class="taskbar-time">
                <div id="clock-time">12:00 PM</div>
                <div id="clock-date">10/24/2023</div>
            </div>
        </div>
    </div>

    <!-- Right-Click Context Menu -->
    <div id="context-menu" class="hidden">
        <div class="context-item" id="ctx-open">Open</div>
        <div class="context-item" id="ctx-delete">Delete</div>
    </div>

    <script src="js/vfs.js"></script>
    <script src="js/os.js"></script>
</body>
</html>
